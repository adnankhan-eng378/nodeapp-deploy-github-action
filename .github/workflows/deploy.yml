name: Node.js CI/CD - Docker Build and Kubernetes Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: yourdockerhubusername/nodejs-app
  DOCKER_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Get source code from GitHub nnn
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Install Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build Docker image
      - name: Build Docker Image
        run: docker build -t $DOCKER_IMAGE:$DOCKER_TAG .

      # 5. Push Docker image to Docker Hub
      - name: Push Docker Image
        run: docker push $DOCKER_IMAGE:$DOCKER_TAG

      # 6. Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 7. Configure kubeconfig
      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config

      # 8. Deploy to Kubernetes
      - name: Kubernetes Deployment
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # 9. Verify deployment
      - name: Check Pods
        run: kubectl get pods

      # 10. Check Services
      - name: Check Services
        run: kubectl get svc