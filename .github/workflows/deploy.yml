name: Node.js CI/CD - Docker Build and Kubernetes Deploy

on:
push:
branches:
- main

env:
DOCKER_IMAGE: adnankhan48/nodejs-app
DOCKER_TAG: latest
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Source Code
    uses: actions/checkout@v4

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build Docker Image
    run: docker build -t $DOCKER_IMAGE:$DOCKER_TAG .

  - name: Push Docker Image
    run: docker push $DOCKER_IMAGE:$DOCKER_TAG

  - name: Setup kubectl
    uses: azure/setup-kubectl@v4

  - name: Set kubeconfig
    run: |
      mkdir -p $HOME/.kube
      echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config

  - name: Kubernetes Deployment
    run: |
      kubectl apply -f k8s/deployment.yaml
      kubectl apply -f k8s/service.yaml

  - name: Check Pods
    run: kubectl get pods

  - name: Check Services
    run: kubectl get svc
```
