```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Login Docker
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build Image
    run: docker build -t adnankhan48/nodejs-app:latest .

  - name: Push Image
    run: docker push adnankhan48/nodejs-app:latest